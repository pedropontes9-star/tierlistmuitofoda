<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLMF - Ranking Foda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%230f0f13'/><rect x='1' y='1' width='5' height='4' rx='1' fill='%23E24B4A'/><rect x='7' y='1' width='24' height='4' rx='1' fill='%231e1e2a'/><rect x='1' y='6' width='5' height='4' rx='1' fill='%23EF9F27'/><rect x='7' y='6' width='24' height='4' rx='1' fill='%231e1e2a'/><rect x='1' y='11' width='5' height='4' rx='1' fill='%23f0d050'/><rect x='7' y='11' width='24' height='4' rx='1' fill='%231e1e2a'/><rect x='1' y='16' width='5' height='4' rx='1' fill='%234caf7d'/><rect x='7' y='16' width='24' height='4' rx='1' fill='%231e1e2a'/><rect x='1' y='21' width='5' height='4' rx='1' fill='%23378ADD'/><rect x='7' y='21' width='24' height='4' rx='1' fill='%231e1e2a'/><rect x='1' y='26' width='5' height='4' rx='1' fill='%237c6fff'/><rect x='7' y='26' width='24' height='4' rx='1' fill='%231e1e2a'/></svg>">
<style>
  :root { --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f0f5;--text2:#8888a0;--accent:#7c6fff;--accent2:#ff6b9d;--radius:10px;--danger:#ff6b6b; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .layout{display:flex;min-height:100vh}

  /* SIDEBAR */
  .sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;padding:20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
  .sidebar-section{padding:16px 20px 8px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);font-weight:600}
  .list-nav{flex:1;overflow-y:auto}
  .list-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;color:var(--text2);border-left:3px solid transparent;transition:all .15s}
  .list-item:hover{background:var(--surface2);color:var(--text)}
  .list-item.active{background:var(--surface2);color:var(--text);border-left-color:var(--accent)}
  .list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .list-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-del{opacity:0;font-size:18px;color:var(--text2);background:none;border:none;cursor:pointer;padding:0 2px;line-height:1}
  .list-item:hover .list-del{opacity:1}
  .list-del:hover{color:var(--danger)}
  .add-list-btn{margin:12px 20px 20px;padding:10px;border-radius:var(--radius);border:1px dashed var(--border2);background:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
  .add-list-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,111,255,.06)}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:10px;padding:14px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .mobile-menu{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer}
  .title-input{font-family:'Bebas Neue',sans-serif;font-size:24px;background:none;border:none;color:var(--text);outline:none;flex:1;min-width:140px;letter-spacing:1px}
  .title-input::placeholder{color:var(--text2)}
  .sync-status{font-size:11px;color:var(--text2);white-space:nowrap}
  .sync-status.saving{color:var(--accent)}
  .sync-status.error{color:var(--danger)}
  .btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
  .btn:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:#6a5fe0;border-color:#6a5fe0;color:#fff}
  .btn-danger{border-color:rgba(255,107,107,.3);color:var(--danger);background:none}
  .btn-danger:hover{background:rgba(255,107,107,.1);border-color:var(--danger)}
  .content{flex:1;padding:20px 24px;overflow-y:auto}
  .gear-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;padding:6px 10px;font-size:16px;transition:all .15s}
  .gear-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* BOARD — 220% */
  .board{display:flex;flex-direction:column;gap:3px;margin-bottom:20px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
  .tier-row{display:flex;align-items:stretch;min-height:212px;position:relative;transition:opacity .15s}
  .tier-row+.tier-row{border-top:1px solid var(--border)}
  .tier-row.tier-dragging{opacity:.35}
  .tier-row.tier-over-top{box-shadow:0 -3px 0 var(--accent)}
  .tier-row.tier-over-bot{box-shadow:0 3px 0 var(--accent)}

  .tier-handle{width:18px;min-width:18px;display:flex;align-items:center;justify-content:center;cursor:grab;color:rgba(255,255,255,.25);font-size:14px;flex-shrink:0;transition:color .15s;user-select:none}
  .tier-handle:hover{color:rgba(255,255,255,.7)}
  .tier-handle:active{cursor:grabbing}

  .tier-label{width:194px;min-width:194px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;flex-shrink:0;transition:filter .15s}
  .tier-label:hover{filter:brightness(1.15)}
  .tier-letter{font-family:'Bebas Neue',sans-serif;font-size:68px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
  .tier-name-lbl{font-size:13px;color:rgba(255,255,255,.75);text-align:center;padding:0 6px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .tier-items{flex:1;display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px;padding:12px;background:var(--surface);min-height:212px;transition:background .15s}
  .tier-items.drag-over{background:rgba(124,111,255,.1);outline:2px dashed var(--accent);outline-offset:-2px}

  /* CARDS */
  .item-card{width:141px;height:211px;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;border:1px solid var(--border);background:var(--surface2);transition:transform .12s,box-shadow .12s;user-select:none}
  .item-card:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:2}
  .item-card.card-dragging{opacity:.35;cursor:grabbing}
  .item-card img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
  .item-lbl{position:absolute;bottom:0;left:0;right:0;font-size:11px;padding:5px 5px 4px;text-align:center;background:linear-gradient(to top,rgba(0,0,0,.88),transparent);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .no-img{font-size:13px;color:var(--text2);text-align:center;padding:10px;display:flex;align-items:center;justify-content:center;height:100%;line-height:1.3;font-weight:500}
  .rating-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;display:flex;align-items:center;gap:2px;pointer-events:none;white-space:nowrap;backdrop-filter:blur(2px)}
  .rm-btn{position:absolute;top:5px;left:5px;width:22px;height:22px;border-radius:50%;background:rgba(220,40,40,.85);color:#fff;border:none;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;font-weight:700;line-height:1;z-index:3}
  .item-card:hover .rm-btn{display:flex}

  .add-card-btn{width:141px;height:211px;border-radius:10px;border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:36px;cursor:pointer;flex-shrink:0;background:none;transition:all .15s;font-family:'DM Sans',sans-serif}
  .add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,111,255,.07)}

  /* MODALS */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative}
  .modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
  .field input[type=text],.field input[type=number]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
  .field input:focus{border-color:var(--accent)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
  
  /* Topics management */
  .topics-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .topic-item{display:flex;align-items:center;gap:8px;background:var(--surface2);padding:6px 10px;border-radius:8px;border:1px solid var(--border)}
  .topic-name{flex:1;font-size:13px}
  .topic-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px}
  .add-topic-row{display:flex;gap:8px}

  /* detail modal specific */
  .detail-img-wrap{width:100%;background:var(--surface2);border-radius:10px;margin-bottom:14px;overflow:hidden;display:none;border:1px solid var(--border)}
  .detail-img-wrap.show{display:block}
  .detail-img{width:100%;height:auto;display:block;max-height:450px;object-fit:contain;margin:0 auto}
  .detail-title{font-size:18px;font-weight:600;margin-bottom:16px;line-height:1.3;color:var(--text);text-align:center}
  .rating-grid{display:grid;grid-template-columns:1fr auto;gap:10px 16px;align-items:center;margin-bottom:16px;background:rgba(255,255,255,0.03);padding:14px;border-radius:10px;border:1px solid var(--border)}
  .rating-topic-label{font-size:13px;font-weight:500;color:var(--text)}
  .rating-topic-input{width:72px;text-align:center;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;-moz-appearance:textfield}
  .rating-topic-input:focus{border-color:var(--accent)}
  .rating-topic-input::-webkit-outer-spin-button,.rating-topic-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .rating-input{width:90px;text-align:center;padding:10px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:18px;font-weight:700;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;-moz-appearance:textfield}
  .rating-input:focus{border-color:var(--accent)}
  .rating-input::-webkit-outer-spin-button,.rating-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .final-score-box{text-align:center;padding:15px;background:linear-gradient(135deg,rgba(124,111,255,0.1),rgba(255,107,157,0.1));border-radius:12px;border:1px solid var(--accent);margin-top:10px}
  .final-score-val{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent)}
  .final-score-label{font-size:11px;text-transform:uppercase;color:var(--text2);letter-spacing:1px}

  /* symbol picker */
  .symbol-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .sym-opt{width:40px;height:40px;border-radius:8px;border:2px solid var(--border2);background:var(--surface2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .sym-opt:hover{border-color:var(--accent);transform:scale(1.1)}
  .sym-opt.sel{border-color:var(--accent);background:rgba(124,111,255,.15)}

  .img-preview{width:60px;height:90px;object-fit:cover;border-radius:6px;background:var(--surface2);display:none}
  .img-preview.show{display:block}
  .upload-zone{border:2px dashed var(--border2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;margin-bottom:10px}
  .upload-zone:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,111,255,.05)}
  .preview-row{display:flex;gap:12px;align-items:center}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer}
  .swatch.sel{border-color:#fff}

  .move-tier-btn{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;width:100%;font-family:'DM Sans',sans-serif;color:var(--text);font-size:14px;font-weight:500}
  .move-tier-btn:hover{border-color:var(--accent);background:rgba(124,111,255,.08);color:var(--accent)}
  .move-tier-dot{width:32px;height:32px;border-radius:6px;flex-shrink:0}
  .move-tier-active{border-color:var(--accent);opacity:.5;cursor:default}

  .url-ok{color:#4caf7d}
  .url-err{color:var(--danger)}
  .url-checking{color:var(--text2)}

  /* UNRANKED */
  .unranked-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px}
  .unranked-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .unranked-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);font-weight:600}
  .unranked-items{display:flex;flex-wrap:wrap;gap:8px;min-height:80px;padding:4px;border-radius:8px;transition:background .15s}
  .unranked-items.drag-over{background:rgba(124,111,255,.08);outline:2px dashed var(--accent);outline-offset:-2px}

  @media(max-width:700px){
    .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:100;transition:left .25s}
    .sidebar.open{left:0}
    .mobile-menu{display:block}
    .tier-label{width:72px;min-width:72px}
    .tier-letter{font-size:28px}
    .item-card,.add-card-btn{width:90px;height:135px}
  }
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar(false)"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="logo">TIERLIST<br>MUITO FODA</div>
    <div class="sidebar-section">Listas Fodas</div>
    <div class="list-nav" id="listNav"></div>
    <button class="add-list-btn" onclick="createList()">+ Nova lista</button>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="mobile-menu" onclick="toggleSidebar(true)">☰</button>
      <input class="title-input" id="listTitle" type="text" placeholder="Nome da lista..." oninput="onTitleInput()" />
      <span class="sync-status" id="syncStatus">Conectando...</span>
      <button class="gear-btn" onclick="openSettings()" title="Configurações da lista">⚙️</button>
      <button class="btn btn-primary" onclick="openAddItem(null)">+ Item</button>
      <button class="btn" onclick="addTier()">+ Tier</button>
    </div>
    <div class="content" id="content">
      <div class="loading">Carregando...</div>
    </div>
  </div>
</div>

<!-- Tier Modal -->
<div class="modal-bg" id="tierModal">
  <div class="modal">
    <h3>Editar Tier</h3>
    <div class="field"><label>Letra / Símbolo</label><input type="text" id="mLetter" maxlength="3"/></div>
    <div class="field"><label>Nome da tier</label><input type="text" id="mName"/></div>
    <div class="field"><label>Cor</label><div class="swatches" id="mSwatches"></div></div>
    <div class="field">
      <label>Símbolo de avaliação desta tier</label>
      <div class="symbol-grid" id="mSymGrid"></div>
      <input type="text" id="mCustomSym" maxlength="2" placeholder="Emoji personalizado..." style="margin-top:8px"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteTier()">Excluir</button>
      <button class="btn" onclick="closeTierModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTier()">Salvar</button>
    </div>
  </div>
</div>

<!-- Add Item Modal -->
<div class="modal-bg" id="itemModal">
  <div class="modal">
    <h3>Adicionar Item</h3>
    <div class="field"><label>Nome</label><input type="text" id="iName" placeholder="Título completo..."/></div>
    <div class="field">
      <label>Imagem (Capa)</label>
      <div class="preview-row">
        <div style="flex:1">
          <div class="upload-zone" onclick="document.getElementById('iFile').click()">📁 Escolher capa</div>
          <input type="file" id="iFile" accept="image/*" style="display:none" onchange="onFile(event)"/>
        </div>
        <img id="iPreview" class="img-preview"/>
      </div>
    </div>
    <div class="field">
      <label>Ou cole URL</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="iUrl" placeholder="https://..." style="flex:1" oninput="onUrl()"/>
        <button class="btn" onclick="validateAddUrl()" title="Verificar se a URL carrega">🔍</button>
      </div>
      <div id="iUrlStatus" style="font-size:11px;margin-top:4px;display:none"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeItemModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveItem()">Adicionar</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div id="dImgWrap" class="detail-img-wrap"><img id="dImg" class="detail-img"/></div>
    <div class="detail-title" id="dTitle"></div>

    <!-- Edit section -->
    <div id="dEditSection" style="margin-bottom:14px;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-weight:600">Editar Item</span>
        <button class="btn" style="font-size:11px;padding:4px 10px" onclick="toggleEdit()">✏️ Editar</button>
      </div>
      <div id="dEditFields" style="display:none">
        <div class="field"><label>Nome</label><input type="text" id="dEditName" placeholder="Nome do item..."/></div>
        <div class="field">
          <label>Imagem</label>
          <div class="preview-row">
            <div style="flex:1">
              <div class="upload-zone" onclick="document.getElementById('dEditFile').click()">📁 Trocar imagem</div>
              <input type="file" id="dEditFile" accept="image/*" style="display:none" onchange="onEditFile(event)"/>
            </div>
            <img id="dEditPreview" class="img-preview"/>
          </div>
        </div>
        <div class="field">
          <label>Ou cole URL</label>
          <div style="display:flex;gap:8px">
            <input type="text" id="dEditUrl" placeholder="https://..." style="flex:1" oninput="onEditUrl()"/>
            <button class="btn" onclick="validateUrl()" title="Verificar se a URL carrega">🔍</button>
          </div>
          <div id="dUrlStatus" style="font-size:11px;margin-top:4px;display:none"></div>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="saveEditItem()">💾 Salvar alterações</button>
      </div>
    </div>

    <div id="dRatingArea"></div>
    <div id="dFinalScore" class="final-score-box" style="display:none">
      <div class="final-score-label">Média Final</div>
      <div class="final-score-val" id="dAverageVal">0.0</div>
      <div class="final-score-label" id="dAverageSym">⭐</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="removeCurrentItem()">Remover item</button>
      <button class="btn" onclick="openMovePicker()">📦 Mover</button>
      <button class="btn" onclick="closeDetailModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveDetail()">Salvar Notas</button>
    </div>
  </div>
</div>

<!-- Move Picker Modal -->
<div class="modal-bg" id="moveModal">
  <div class="modal" style="max-width:340px">
    <h3>Mover para...</h3>
    <div id="moveTierList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeMoveModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h3>⚙️ Configurações da Lista</h3>
    <div class="field">
      <label>Símbolo de avaliação padrão</label>
      <div class="symbol-grid" id="symGrid"></div>
      <input type="text" id="customSym" maxlength="2" placeholder="Ou digite um emoji personalizado..." style="margin-top:8px"/>
    </div>
    <div class="field">
      <label>Tópicos de Avaliação</label>
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Defina critérios de avaliação para todos os itens desta lista (ex: Animação, História, Trilha Sonora).</p>
      <div id="sTopicsList" class="topics-list"></div>
      <div class="add-topic-row">
        <input type="text" id="sNewTopicInput" placeholder="Novo tópico..."/>
        <button class="btn" onclick="addSettingsTopic()">Add</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSettings()">Salvar</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://huzirwsndytsrscusbva.supabase.co';
const SB_KEY = 'sb_publishable_0WYmGf8qfcKRaZSMNdItAQ_akyriYos';
const COLORS = ['#E24B4A','#f4845f','#EF9F27','#f0d050','#4caf7d','#1D9E75','#378ADD','#6b9eff','#7c6fff','#b06fff','#D4537E','#ff6b9d','#607080','#a0a0b8'];
const SYMBOLS = ['⭐','🔥','💎','👑','🎌','🏆','⚡','💀','🌸','🎯','🍥','🗡️'];
const DEF_TIERS = [
  {letter:'S',name:'Obra-prima',color:'#E24B4A'},
  {letter:'A',name:'Excelente', color:'#EF9F27'},
  {letter:'B',name:'Muito bom', color:'#f0d050'},
  {letter:'C',name:'Bom',       color:'#4caf7d'},
  {letter:'D',name:'Mediano',   color:'#378ADD'},
  {letter:'E',name:'Fraco',     color:'#7c6fff'},
  {letter:'F',name:'Ruim',      color:'#D4537E'},
];

let lists=[], activeId=null, editingTierId=null, addingToTierId=null;
let currentImg=null, saveTimer=null, dragItemId=null, dragItemFrom=null, dragTierId=null;
let detailItemId=null, detailFromId=null;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const aList=()=>lists.find(l=>l.id===activeId)||null;

function findItem(list,id){
  for(const t of list.tiers){const i=t.items.find(x=>x.id===id);if(i)return{item:i,from:t.id};}
  const u=list.unranked.find(x=>x.id===id);
  return u?{item:u,from:'unranked'}:null;
}

// ── SUPABASE ──
async function sbReq(path,opts={}){
  const h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',...(opts.headers||{})};
  const r=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:h});
  const t=await r.text();
  if(!r.ok)throw new Error(t);
  return t?JSON.parse(t):null;
}
async function loadAll(){
  const rows=await sbReq('lists?order=updated_at.asc&select=id,title,color,data');
  return(rows||[]).map(r=>({id:r.id,title:r.title,color:r.color,tiers:r.data?.tiers||[],unranked:r.data?.unranked||[],ratingSymbol:r.data?.ratingSymbol||'⭐',topics:r.data?.topics||[]}));
}
async function upsert(list){
  const{id,title,color,tiers,unranked,ratingSymbol,topics}=list;
  await sbReq('lists',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id,title,color,data:{tiers,unranked,ratingSymbol,topics},updated_at:new Date().toISOString()})});
}
async function delList(id){await sbReq('lists?id=eq.'+id,{method:'DELETE'});}
function setStatus(m,c=''){const e=document.getElementById('syncStatus');e.textContent=m;e.className='sync-status '+c;}
function scheduleSave(list){
  clearTimeout(saveTimer);setStatus('Salvando...','saving');
  saveTimer=setTimeout(async()=>{try{await upsert(list);setStatus('✓ Salvo');}catch(e){setStatus('⚠ Erro','error');}},600);
}

// ── OPS ──
async function createList(){
  const l={id:uid(),title:'Nova Tier List',color:COLORS[0],ratingSymbol:'⭐',topics:[],
    tiers:DEF_TIERS.map(t=>({id:uid(),letter:t.letter,name:t.name,color:t.color,items:[],ratingSymbol:null})),unranked:[]};
  lists.push(l);activeId=l.id;renderAll();
  try{await upsert(l);setStatus('✓ Salvo');}catch(e){}
}
async function deleteList(id,e){
  e.stopPropagation();if(!confirm('Excluir lista?'))return;
  lists=lists.filter(l=>l.id!==id);if(activeId===id)activeId=lists[0]?.id||null;
  renderAll();try{await delList(id);}catch(e){}
}
function selectList(id){activeId=id;renderAll();if(window.innerWidth<=700)toggleSidebar(false);}
function onTitleInput(){const l=aList();if(!l)return;l.title=document.getElementById('listTitle').value;renderSidebar();scheduleSave(l);}

// ── SETTINGS ──
let currentListTopics=[];
function openSettings(){
  const l=aList();if(!l)return;
  currentListTopics=[...(l.topics||[])];
  const g=document.getElementById('symGrid');g.innerHTML='';
  SYMBOLS.forEach(s=>{
    const el=document.createElement('div');el.className='sym-opt'+(l.ratingSymbol===s?' sel':'');el.textContent=s;
    el.onclick=()=>{g.querySelectorAll('.sym-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');document.getElementById('customSym').value='';};
    g.appendChild(el);
  });
  document.getElementById('customSym').value=SYMBOLS.includes(l.ratingSymbol)?'':l.ratingSymbol;
  renderSettingsTopics();
  document.getElementById('settingsModal').classList.add('open');
}
function renderSettingsTopics(){
  const list=document.getElementById('sTopicsList');list.innerHTML='';
  currentListTopics.forEach((topic,idx)=>{
    const el=document.createElement('div');el.className='topic-item';
    el.innerHTML=`<span class="topic-name">${topic}</span><button class="topic-del" onclick="removeSettingsTopic(${idx})">×</button>`;
    list.appendChild(el);
  });
}
function addSettingsTopic(){
  const inp=document.getElementById('sNewTopicInput');const val=inp.value.trim();
  if(val){currentListTopics.push(val);inp.value='';renderSettingsTopics();}
}
function removeSettingsTopic(idx){currentListTopics.splice(idx,1);renderSettingsTopics();}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open');}
function saveSettings(){
  const l=aList();if(!l)return;
  const custom=document.getElementById('customSym').value.trim();
  const sel=document.querySelector('#symGrid .sel');
  l.ratingSymbol=custom||(sel?sel.textContent:'⭐');
  l.topics=[...currentListTopics];
  closeSettings();renderMain();scheduleSave(l);
}

// ── TIERS ──
function addTier(){
  const l=aList();if(!l)return;
  l.tiers.push({id:uid(),letter:'?',name:'Nova Tier',color:COLORS[l.tiers.length%COLORS.length],items:[],ratingSymbol:null});
  renderMain();scheduleSave(l);
}
function openTierModal(tierId){
  const l=aList();if(!l)return;
  const t=l.tiers.find(x=>x.id===tierId);if(!t)return;
  editingTierId=tierId;
  document.getElementById('mLetter').value=t.letter;
  document.getElementById('mName').value=t.name;
  const sw=document.getElementById('mSwatches');sw.innerHTML='';
  COLORS.forEach(c=>{
    const s=document.createElement('div');s.className='swatch'+(t.color===c?' sel':'');s.style.background=c;
    s.onclick=()=>{sw.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');};sw.appendChild(s);
  });
  const g=document.getElementById('mSymGrid');g.innerHTML='';
  SYMBOLS.forEach(s=>{
    const el=document.createElement('div');el.className='sym-opt'+(t.ratingSymbol===s?' sel':'');el.textContent=s;
    el.onclick=()=>{g.querySelectorAll('.sym-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');document.getElementById('mCustomSym').value='';};g.appendChild(el);
  });
  document.getElementById('mCustomSym').value=(t.ratingSymbol && !SYMBOLS.includes(t.ratingSymbol))?t.ratingSymbol:'';
  document.getElementById('tierModal').classList.add('open');
}
function closeTierModal(){document.getElementById('tierModal').classList.remove('open');editingTierId=null;}
function saveTier(){
  const l=aList();if(!l)return;
  const t=l.tiers.find(x=>x.id===editingTierId);if(!t)return;
  t.letter=document.getElementById('mLetter').value||t.letter;
  t.name=document.getElementById('mName').value;
  const selC=document.querySelector('#mSwatches .sel');if(selC)t.color=selC.style.background;
  const customS=document.getElementById('mCustomSym').value.trim();
  const selS=document.querySelector('#mSymGrid .sel');
  t.ratingSymbol=customS||(selS?selS.textContent:null);
  closeTierModal();renderAll();scheduleSave(l);
}
function deleteTier(){
  if(!confirm('Excluir tier?'))return;
  const l=aList();const t=l.tiers.find(x=>x.id===editingTierId);
  l.unranked.push(...t.items);l.tiers=l.tiers.filter(x=>x.id!==editingTierId);
  closeTierModal();renderMain();scheduleSave(l);
}

// ── TIER DRAG ──
function onTierHandleDragStart(e,id){dragTierId=id;e.currentTarget.closest('.tier-row').classList.add('tier-dragging');e.dataTransfer.effectAllowed='move';e.stopPropagation();}
function onTierHandleDragEnd(){document.querySelectorAll('.tier-row').forEach(r=>r.classList.remove('tier-dragging','tier-over-top','tier-over-bot'));dragTierId=null;}
function onTierRowDragOver(e,id){if(!dragTierId||dragTierId===id)return;e.preventDefault();e.stopPropagation();const r=e.currentTarget;const rect=r.getBoundingClientRect();document.querySelectorAll('.tier-row').forEach(x=>x.classList.remove('tier-over-top','tier-over-bot'));r.classList.add(e.clientY<rect.top+rect.height/2?'tier-over-top':'tier-over-bot');}
function onTierRowDrop(e,id){
  if(!dragTierId||dragTierId===id)return;e.preventDefault();const l=aList();const rect=e.currentTarget.getBoundingClientRect();const before=e.clientY<rect.top+rect.height/2;
  const fi=l.tiers.findIndex(x=>x.id===dragTierId);const [m]=l.tiers.splice(fi,1);const ti=l.tiers.findIndex(x=>x.id===id);l.tiers.splice(before?ti:ti+1,0,m);
  renderMain();scheduleSave(l);
}

// ── ITEMS ──
function openAddItem(tierId){addingToTierId=tierId;currentImg=null;['iName','iUrl'].forEach(id=>document.getElementById(id).value='');document.getElementById('iFile').value='';document.getElementById('iPreview').className='img-preview';document.getElementById('itemModal').classList.add('open');setTimeout(()=>document.getElementById('iName').focus(),80);}
function closeItemModal(){document.getElementById('itemModal').classList.remove('open');}
function onFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');const max=800;let w=i.width,h=i.height;if(w>max||h>max){if(w>h){h=h*max/w;w=max;}else{w=w*max/h;h=max;}}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);currentImg=c.toDataURL('image/jpeg',0.8);document.getElementById('iPreview').src=currentImg;document.getElementById('iPreview').className='img-preview show';};i.src=ev.target.result;};r.readAsDataURL(f);}
function onUrl(){const u=document.getElementById('iUrl').value.trim();if(u){currentImg=u;document.getElementById('iPreview').src=u;document.getElementById('iPreview').className='img-preview show';}document.getElementById('iUrlStatus').style.display='none';}
async function validateAddUrl(){
  const u=document.getElementById('iUrl').value.trim();
  const st=document.getElementById('iUrlStatus');
  if(!u){st.textContent='⚠ Nenhuma URL digitada';st.className='url-err';st.style.display='block';return;}
  if(!u.startsWith('https://')){st.textContent='⚠ Use sempre URLs com https:// para evitar bloqueios';st.className='url-err';st.style.display='block';return;}
  st.textContent='🔍 Verificando...';st.className='url-checking';st.style.display='block';
  try{
    const img=new Image();
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=u+'?t='+Date.now();setTimeout(rej,8000);});
    st.textContent='✅ URL carregou com sucesso!';st.className='url-ok';
  }catch{
    st.textContent='❌ URL não carregou — pode ser bloqueio de rede ou certificado inválido. Prefira fazer upload direto.';st.className='url-err';
  }
}
function saveItem(){
  const name=document.getElementById('iName').value.trim();if(!name)return;const l=aList();
  const item={id:uid(),name,img:currentImg||'',rating:null,ratings:{}};
  if(addingToTierId){const t=l.tiers.find(x=>x.id===addingToTierId);t.items.push(item);sortTier(t);}
  else l.unranked.push(item);
  closeItemModal();renderMain();scheduleSave(l);
}
function removeItem(itemId,fromId,e){if(e)e.stopPropagation();const l=aList();if(fromId==='unranked')l.unranked=l.unranked.filter(x=>x.id!==itemId);else{const t=l.tiers.find(x=>x.id===fromId);if(t)t.items=t.items.filter(x=>x.id!==itemId);}renderMain();scheduleSave(l);}

// ── DETAIL ──
function openDetail(itemId,fromId){
  const l=aList();const found=findItem(l,itemId);if(!found)return;
  detailItemId=itemId;detailFromId=fromId;const{item}=found;
  document.getElementById('dTitle').textContent=item.name;
  const di=document.getElementById('dImg');const dw=document.getElementById('dImgWrap');
  if(item.img){di.src=item.img;dw.className='detail-img-wrap show';}else{dw.className='detail-img-wrap';}
  
  const area=document.getElementById('dRatingArea');area.innerHTML='';
  const topics=l.topics||[];
  let sym=l.ratingSymbol||'⭐';
  if(fromId!=='unranked'){const t=l.tiers.find(x=>x.id===fromId);if(t&&t.ratingSymbol)sym=t.ratingSymbol;}
  
  if(topics.length>0){
    const grid=document.createElement('div');grid.className='rating-grid';
    topics.forEach(t=>{
      const val=item.ratings?.[t]||'';
      grid.innerHTML+=`<div class="rating-topic-label">${t}</div><input type="number" class="rating-topic-input" data-topic="${t}" min="0" max="10" step="0.1" value="${val}" oninput="calcAvg()"/>`;
    });
    area.appendChild(grid);
    document.getElementById('dFinalScore').style.display='block';
    document.getElementById('dAverageSym').textContent=sym;
    calcAvg();
  }else{
    const val=item.rating!=null?item.rating:'';
    area.innerHTML=`<div class="field"><label>Nota (0,0 - 10,0)</label><div style="display:flex;align-items:center;gap:10px"><input class="rating-input" type="number" id="dSingleRating" min="0" max="10" step="0.1" value="${val}" placeholder="—"/><span style="font-size:24px">${sym}</span></div></div>`;
    document.getElementById('dFinalScore').style.display='none';
  }
  document.getElementById('detailModal').classList.add('open');
}
function calcAvg(){
  const inps=document.querySelectorAll('.rating-topic-input');let sum=0,count=0;
  inps.forEach(i=>{const v=parseFloat(i.value);if(!isNaN(v)){sum+=v;count++;}});
  const avg=count>0?(sum/count):0;
  document.getElementById('dAverageVal').textContent=avg.toFixed(1);
}
function saveDetail(){
  const l=aList();const found=findItem(l,detailItemId);if(!found)return;
  const inps=document.querySelectorAll('.rating-topic-input');
  if(inps.length>0){
    let sum=0,count=0;found.item.ratings={};
    inps.forEach(i=>{const v=parseFloat(i.value);const t=i.dataset.topic;if(!isNaN(v)){const val=Math.min(10,Math.max(0,v));found.item.ratings[t]=val;sum+=val;count++;}});
    found.item.rating=count>0?Math.round((sum/count)*10)/10:null;
  }else{
    const v=parseFloat(document.getElementById('dSingleRating').value);
    found.item.rating=!isNaN(v)?Math.min(10,Math.max(0,v)):null;
  }
  if(detailFromId!=='unranked'){const t=l.tiers.find(x=>x.id===detailFromId);if(t)sortTier(t);}
  closeDetailModal();renderMain();scheduleSave(l);
}
function removeCurrentItem(){closeDetailModal();removeItem(detailItemId,detailFromId);}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('open');document.getElementById('dEditFields').style.display='none';}

// ── EDIT ITEM ──
let editImg=null;
function toggleEdit(){
  const fields=document.getElementById('dEditFields');
  const open=fields.style.display==='none';
  fields.style.display=open?'block':'none';
  if(open){
    const l=aList();const found=findItem(l,detailItemId);if(!found)return;
    const item=found.item;
    document.getElementById('dEditName').value=item.name;
    document.getElementById('dEditUrl').value=item.img&&!item.img.startsWith('data:')?item.img:'';
    const p=document.getElementById('dEditPreview');
    if(item.img){p.src=item.img;p.className='img-preview show';}else{p.src='';p.className='img-preview';}
    editImg=item.img||null;
    document.getElementById('dUrlStatus').style.display='none';
  }
}
function onEditFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');const max=800;let w=i.width,h=i.height;if(w>max||h>max){if(w>h){h=h*max/w;w=max;}else{w=w*max/h;h=max;}}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);editImg=c.toDataURL('image/jpeg',0.8);document.getElementById('dEditPreview').src=editImg;document.getElementById('dEditPreview').className='img-preview show';document.getElementById('dEditUrl').value='';};i.src=ev.target.result;};
  r.readAsDataURL(f);
}
function onEditUrl(){
  const u=document.getElementById('dEditUrl').value.trim();
  if(u){editImg=u;document.getElementById('dEditPreview').src=u;document.getElementById('dEditPreview').className='img-preview show';}
  document.getElementById('dUrlStatus').style.display='none';
}
async function validateUrl(){
  const u=document.getElementById('dEditUrl').value.trim();
  const st=document.getElementById('dUrlStatus');
  if(!u){st.textContent='⚠ Nenhuma URL digitada';st.className='url-err';st.style.display='block';return;}
  if(!u.startsWith('https://')){st.textContent='⚠ Use sempre URLs com https:// para evitar bloqueios';st.className='url-err';st.style.display='block';return;}
  st.textContent='🔍 Verificando...';st.className='url-checking';st.style.display='block';
  try{
    const img=new Image();
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=u+'?t='+Date.now();setTimeout(rej,8000);});
    st.textContent='✅ URL carregou com sucesso!';st.className='url-ok';
  }catch{
    st.textContent='❌ URL não carregou — pode ser bloqueio de rede ou certificado inválido. Prefira fazer upload direto da imagem.';st.className='url-err';
  }
}
function saveEditItem(){
  const name=document.getElementById('dEditName').value.trim();if(!name)return;
  const l=aList();const found=findItem(l,detailItemId);if(!found)return;
  found.item.name=name;
  found.item.img=editImg||'';
  document.getElementById('dTitle').textContent=name;
  const di=document.getElementById('dImg');const dw=document.getElementById('dImgWrap');
  if(found.item.img){di.src=found.item.img;dw.className='detail-img-wrap show';}else{dw.className='detail-img-wrap';}
  document.getElementById('dEditFields').style.display='none';
  renderMain();scheduleSave(l);
}

function sortTier(tier){tier.items.sort((a,b)=>(b.rating||0)-(a.rating||0));}

// ── RENDER ──
function makeCard(item,from,sym){
  const r=item.rating!=null?item.rating:null;
  const badge=r!=null?`<div class="rating-badge">${r.toFixed(1)}&nbsp;${sym}</div>`:'';
  const inner=item.img?`<img src="${item.img}" alt="${item.name}" draggable="false"><div class="item-lbl">${item.name}</div>`:`<div class="no-img">${item.name}</div>`;
  return `<div class="item-card" data-itemid="${item.id}" data-from="${from}" draggable="true" onclick="openDetail('${item.id}','${from}')">${inner}${badge}<button class="rm-btn" onclick="removeItem('${item.id}','${from}',event)">×</button></div>`;
}
function bindCards(){
  document.querySelectorAll('.item-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{if(e.target.classList.contains('rm-btn')){e.preventDefault();return;}dragItemId=card.dataset.itemid;dragItemFrom=card.dataset.from;e.dataTransfer.effectAllowed='move';setTimeout(()=>card.classList.add('card-dragging'),0);});
    card.addEventListener('dragend',()=>{card.classList.remove('card-dragging');dragItemId=null;dragItemFrom=null;stopAutoScroll();});
  });
}
function renderSidebar(){
  const nav=document.getElementById('listNav');nav.innerHTML='';
  lists.forEach(l=>{const el=document.createElement('div');el.className='list-item'+(l.id===activeId?' active':'');el.onclick=()=>selectList(l.id);el.innerHTML=`<div class="list-dot" style="background:${l.color}"></div><span class="list-name">${l.title}</span><button class="list-del" onclick="deleteList('${l.id}',event)">×</button>`;nav.appendChild(el);});
}
function renderMain(){
  const content=document.getElementById('content');const l=aList();if(!l){content.innerHTML='<div class="empty"><h2>Bem-vindo!</h2><button class="btn btn-primary" onclick="createList()">+ Nova lista</button></div>';return;}
  document.getElementById('listTitle').value=l.title;const defSym=l.ratingSymbol||'⭐';
  let html='<div class="board-controls"><span class="hint">⠿ Arraste o handle para reordenar tiers</span></div><div class="board">';
  l.tiers.forEach(t=>{
    sortTier(t);const sym=t.ratingSymbol||defSym;
    html+=`<div class="tier-row" data-tierid="${t.id}" ondragover="onTierRowDragOver(event,'${t.id}')" ondrop="onTierRowDrop(event,'${t.id}')" ondragleave="document.querySelectorAll('.tier-row').forEach(x=>x.classList.remove('tier-over-top','tier-over-bot'))">
      <div class="tier-handle" draggable="true" ondragstart="onTierHandleDragStart(event,'${t.id}')" ondragend="onTierHandleDragEnd()">⠿</div>
      <div class="tier-label" style="background:${t.color}" onclick="openTierModal('${t.id}')"><span class="tier-letter">${t.letter}</span><span class="tier-name-lbl">${t.name}</span></div>
      <div class="tier-items" data-tierid="${t.id}" ondragover="onDragOver(event)" ondrop="onDrop(event,'${t.id}')" ondragleave="onDragLeave(event)">${t.items.map(i=>makeCard(i,t.id,sym)).join('')}<button class="add-card-btn" onclick="openAddItem('${t.id}')">+</button></div>
    </div>`;
  });
  html+=`</div><div class="unranked-wrap"><div class="unranked-top"><span class="unranked-title">Sem rank</span><button class="btn" onclick="openAddItem(null)">+ Adicionar</button></div><div class="unranked-items" id="unranked" ondragover="onDragOver(event)" ondrop="onDrop(event,'unranked')" ondragleave="onDragLeave(event)">${l.unranked.map(i=>makeCard(i,'unranked',defSym)).join('')}</div></div>`;
  content.innerHTML=html;bindCards();
}
function renderAll(){renderSidebar();renderMain();}
function toggleSidebar(open){document.getElementById('sidebar').classList.toggle('open',open);document.getElementById('overlay').classList.toggle('open',open);}
function onDragOver(e){e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function onDrop(e,toId){
  e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drag-over');if(!dragItemId)return;
  const l=aList();let item;if(dragItemFrom==='unranked'){item=l.unranked.find(x=>x.id===dragItemId);l.unranked=l.unranked.filter(x=>x.id!==dragItemId);}else{const t=l.tiers.find(x=>x.id===dragItemFrom);item=t?.items.find(x=>x.id===dragItemId);if(t)t.items=t.items.filter(x=>x.id!==dragItemId);}
  if(item){if(toId==='unranked')l.unranked.push(item);else{const t=l.tiers.find(x=>x.id===toId);t.items.push(item);sortTier(t);}}
  renderMain();scheduleSave(l);
}

['tierModal','itemModal','detailModal','settingsModal','moveModal'].forEach(id=>{document.getElementById(id).onclick=e=>{if(e.target===e.currentTarget)document.getElementById(id).classList.remove('open');};});

// ── MOVE PICKER ──
function openMovePicker(){
  const l=aList();if(!l)return;
  const list=document.getElementById('moveTierList');list.innerHTML='';
  // Tiers
  l.tiers.forEach(t=>{
    const isCurrent=detailFromId===t.id;
    const btn=document.createElement('button');
    btn.className='move-tier-btn'+(isCurrent?' move-tier-active':'');
    btn.disabled=isCurrent;
    btn.innerHTML=`<div class="move-tier-dot" style="background:${t.color}"></div><span>${t.letter} — ${t.name}</span>${isCurrent?'<span style="margin-left:auto;font-size:11px;color:var(--text2)">atual</span>':''}`;
    if(!isCurrent)btn.onclick=()=>moveItemTo(t.id);
    list.appendChild(btn);
  });
  // Sem rank
  const isCurrent=detailFromId==='unranked';
  const btn=document.createElement('button');
  btn.className='move-tier-btn'+(isCurrent?' move-tier-active':'');
  btn.disabled=isCurrent;
  btn.innerHTML=`<div class="move-tier-dot" style="background:var(--surface2);border:1px solid var(--border2)"></div><span>Sem rank</span>${isCurrent?'<span style="margin-left:auto;font-size:11px;color:var(--text2)">atual</span>':''}`;
  if(!isCurrent)btn.onclick=()=>moveItemTo('unranked');
  list.appendChild(btn);
  document.getElementById('moveModal').classList.add('open');
}
function closeMoveModal(){document.getElementById('moveModal').classList.remove('open');}
function moveItemTo(toId){
  const l=aList();if(!l||!detailItemId)return;
  let item;
  if(detailFromId==='unranked'){item=l.unranked.find(x=>x.id===detailItemId);l.unranked=l.unranked.filter(x=>x.id!==detailItemId);}
  else{const t=l.tiers.find(x=>x.id===detailFromId);item=t?.items.find(x=>x.id===detailItemId);if(t)t.items=t.items.filter(x=>x.id!==detailItemId);}
  if(!item)return;
  if(toId==='unranked')l.unranked.push(item);
  else{const t=l.tiers.find(x=>x.id===toId);if(t){t.items.push(item);sortTier(t);}}
  closeMoveModal();closeDetailModal();renderMain();scheduleSave(l);
}

// ── AUTO-SCROLL DURANTE DRAG ──
let scrollRaf=null, scrollActive=false, scrollSafetyTimer=null;
const SCROLL_ZONE=80,SCROLL_SPEED=14;

function startAutoScroll(speed){
  stopAutoScroll();
  scrollActive=true;
  const step=()=>{
    if(!scrollActive||!dragItemId){stopAutoScroll();return;}
    window.scrollBy(0,speed);
    scrollRaf=requestAnimationFrame(step);
  };
  scrollRaf=requestAnimationFrame(step);
}
function stopAutoScroll(){
  scrollActive=false;
  cancelAnimationFrame(scrollRaf);
  scrollRaf=null;
  clearTimeout(scrollSafetyTimer);
}
function dragAutoScroll(e){
  if(!dragItemId){stopAutoScroll();return;}
  // reset safety timer — se não receber dragover por 150ms, para tudo
  clearTimeout(scrollSafetyTimer);
  scrollSafetyTimer=setTimeout(stopAutoScroll,150);
  const y=e.clientY,h=window.innerHeight;
  if(y<SCROLL_ZONE){
    startAutoScroll(-SCROLL_SPEED*(1-(y/SCROLL_ZONE)));
  }else if(y>h-SCROLL_ZONE){
    startAutoScroll(SCROLL_SPEED*(1-((h-y)/SCROLL_ZONE)));
  }else{
    stopAutoScroll();
  }
}
document.addEventListener('dragover',dragAutoScroll);
document.addEventListener('dragend',stopAutoScroll,true);
document.addEventListener('drop',stopAutoScroll,true);
document.addEventListener('mouseup',stopAutoScroll,true);
document.addEventListener('pointerup',stopAutoScroll,true);
document.addEventListener('dragleave',e=>{
  if(e.clientY<=0||e.clientX<=0||e.clientX>=window.innerWidth||e.clientY>=window.innerHeight)stopAutoScroll();
});

// ── SCROLL COM MOUSE PRESSIONADO (click + hold + move) ──
let isMouseScrolling=false,mouseScrollY=0,mouseScrollX=0;
document.addEventListener('mousedown',e=>{
  // só ativa em área de conteúdo, não em botões/inputs/cards
  if(e.button!==0)return;
  const tag=e.target.tagName;
  if(['BUTTON','INPUT','TEXTAREA','SELECT','A'].includes(tag))return;
  if(e.target.closest('.item-card,.tier-label,.tier-handle,.modal,.sidebar,.topbar'))return;
  isMouseScrolling=true;mouseScrollY=e.clientY;mouseScrollX=e.clientX;
  document.body.style.cursor='grabbing';
});
document.addEventListener('mousemove',e=>{
  if(!isMouseScrolling)return;
  const dy=mouseScrollY-e.clientY;
  const dx=mouseScrollX-e.clientX;
  window.scrollBy(dx,dy);
  mouseScrollY=e.clientY;mouseScrollX=e.clientX;
});
document.addEventListener('mouseup',()=>{
  if(!isMouseScrolling)return;
  isMouseScrolling=false;
  document.body.style.cursor='';
});
document.addEventListener('mouseleave',()=>{
  if(!isMouseScrolling)return;
  isMouseScrolling=false;
  document.body.style.cursor='';
});

(async()=>{try{lists=await loadAll();activeId=lists.length>0?lists[lists.length-1].id:null;renderAll();setStatus('✓ Conectado');}catch(e){console.error(e);setStatus('⚠ Erro','error');}})();
</script>
